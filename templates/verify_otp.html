<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — Campus Lost & Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #080c14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* background glow */
        body::before {
            content: '';
            position: fixed;
            top: -100px; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(56,189,248,0.10) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            background: #0f1623;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            position: relative;
        }

        .icon {
            width: 72px; height: 72px;
            background: rgba(56,189,248,0.12);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            border: 1.5px solid rgba(56,189,248,0.25);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            color: #e2e8f0;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 6px;
            line-height: 1.6;
        }

        .email-badge {
            display: inline-block;
            background: rgba(56,189,248,0.1);
            color: #38bdf8;
            font-size: 13px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(56,189,248,0.2);
            margin-bottom: 32px;
        }

        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: left;
        }

        /* OTP input boxes */
        .otp-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .otp-box {
            width: 52px; height: 60px;
            background: #1a2235;
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            color: #e2e8f0;
            text-align: center;
            caret-color: #38bdf8;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .otp-box:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
            background: #1e2d45;
        }

        .otp-box.filled {
            border-color: rgba(56,189,248,0.5);
            color: #38bdf8;
        }

        /* hidden actual input */
        #otp-hidden { display: none; }

        .btn-verify {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 4px 20px rgba(56,189,248,0.3);
        }

        .btn-verify:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .resend-row {
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }

        .resend-row a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }

        .resend-row a:hover { text-decoration: underline; }

        .timer {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .card { padding: 36px 24px; }
            .otp-box { width: 44px; height: 54px; font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">📧</div>
    <h1>Verify Your Email</h1>
    <p class="subtitle">We sent a 6-digit verification code to</p>
    <div class="email-badge">{{ email }}</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#86efac;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;">{{ success }}</div>
    {% endif %}

    <form action="/verify_otp" method="POST" id="otp-form">
        <div class="otp-row" id="otp-row">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="0" autocomplete="off">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="1" autocomplete="off">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2" autocomplete="off">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3" autocomplete="off">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4" autocomplete="off">
            <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="5" autocomplete="off">
        </div>
        <input type="hidden" name="otp" id="otp-hidden">
        <button type="submit" class="btn-verify" id="verify-btn" disabled>✅ Verify & Create Account</button>
    </form>

    <div class="resend-row">
        Didn't receive it? <a href="/resend_otp">Resend OTP</a>
    </div>
    <div class="timer" id="timer">Code expires in <span id="countdown">10:00</span></div>
</div>

<script>
const boxes = document.querySelectorAll('.otp-box');
const hiddenInput = document.getElementById('otp-hidden');
const verifyBtn = document.getElementById('verify-btn');

boxes.forEach((box, i) => {
    box.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        box.value = val;
        box.classList.toggle('filled', val.length > 0);

        // Auto-advance
        if (val && i < boxes.length - 1) {
            boxes[i + 1].focus();
        }

        updateHidden();
    });

    box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && i > 0) {
            boxes[i - 1].focus();
            boxes[i - 1].value = '';
            boxes[i - 1].classList.remove('filled');
            updateHidden();
        }
    });

    // Handle paste
    box.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        pasted.split('').forEach((ch, idx) => {
            if (boxes[idx]) {
                boxes[idx].value = ch;
                boxes[idx].classList.add('filled');
            }
        });
        if (boxes[Math.min(pasted.length, 5)]) boxes[Math.min(pasted.length, 5)].focus();
        updateHidden();
    });
});

function updateHidden() {
    const otp = Array.from(boxes).map(b => b.value).join('');
    hiddenInput.value = otp;
    verifyBtn.disabled = otp.length < 6;
}

// Focus first box on load
boxes[0].focus();

// ✅ Auto-paste when user copies OTP from Gmail and switches back to tab
async function tryAutoPaste() {
    try {
        const text = await navigator.clipboard.readText();
        const digits = text.replace(/[^0-9]/g, "").slice(0, 6);
        if (digits.length === 6 && hiddenInput.value.length < 6) {
            digits.split("").forEach((ch, idx) => {
                boxes[idx].value = ch;
                boxes[idx].classList.add("filled");
            });
            boxes[5].focus();
            updateHidden();
            // Bounce animation to show it worked
            const row = document.getElementById("otp-row");
            row.style.transition = "transform 0.15s";
            row.style.transform = "scale(1.06)";
            setTimeout(() => row.style.transform = "scale(1)", 200);
        }
    } catch (e) { /* clipboard permission denied - user types manually */ }
}

// Trigger when user comes back to tab from Gmail
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") tryAutoPaste();
});

// Also trigger on window focus (mobile)
window.addEventListener("focus", tryAutoPaste);

// Countdown timer 10 minutes
let seconds = 600;
const countdownEl = document.getElementById('countdown');
const interval = setInterval(() => {
    seconds--;
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    countdownEl.textContent = `${m}:${s}`;
    if (seconds <= 0) {
        clearInterval(interval);
        countdownEl.textContent = 'Expired';
        countdownEl.style.color = '#ef4444';
        verifyBtn.disabled = true;
        verifyBtn.textContent = '⏰ Code Expired — Resend OTP';
    }
}, 1000);
</script>
</body>
</html>
